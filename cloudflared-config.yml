# Cloudflare Named Tunnel — permanent URLs for local services.
# Replace <TUNNEL_ID> with the ID printed by: cloudflared tunnel create memorylane
# Replace yourdomain.com with your actual domain.
#
# Run with: .\cloudflared.exe tunnel --config cloudflared-config.yml run
# Or as a Windows service (auto-start on boot): see bottom of this file.

tunnel: <TUNNEL_ID>
credentials-file: C:\Users\NinaTran\.cloudflared\<TUNNEL_ID>.json

ingress:
  # Backend API — set this as BACKEND_URL in Cloudflare Pages
  - hostname: api.yourdomain.com
    service: http://localhost:3001

  # NocoDB admin UI — share with teammates
  - hostname: admin.yourdomain.com
    service: http://localhost:8081

  # Catch-all required by cloudflared
  - service: http_status:404

# ── Run as a Windows service (optional, starts tunnel on boot) ───────────────
# Run once as Administrator to install:
#   .\cloudflared.exe service install --config C:\Users\NinaTran\Downloads\aos\MemoriesLane\cloudflared-config.yml
# Then start it:
#   Start-Service cloudflared
# To uninstall:
#   .\cloudflared.exe service uninstall
