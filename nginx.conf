server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container.
    # When the frontend is wired to the backend, all /api/* requests go here
    # with no CORS issues because everything appears on the same origin.
    location /api {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Prevent the backend from ever seeing the raw IP — the proxy strips
        # it to the forwarded header only, which the backend also never logs.
        proxy_hide_header  X-Real-IP;
        client_max_body_size 2M;
    }
}
