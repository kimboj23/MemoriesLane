# Sample Bellingcat auto-archiver config for the MemoryLane archive-worker.
#
# The worker invokes auto-archiver per URL with:
#   --config /config/orchestration.yaml <url>
#
# One-time setup (copy this into the config volume, then fill in real keys):
#   docker run --rm -v memorylane-autoarchiver-config:/config -v "%cd%/worker/auto-archiver":/src \
#     alpine sh -c "cp /src/orchestration.sample.yaml /config/orchestration.yaml"
#
# Module names are valid for auto-archiver 1.2.7 (run
# `docker run --rm bellingcat/auto-archiver:latest --help` to list them).

steps:
  feeders:
    - cli_feeder               # URLs passed as positional args on the CLI
  extractors:
    - generic_extractor        # yt-dlp-backed: YouTube, Twitter/X, TikTok, etc.
    - antibot_extractor_enricher  # browser-based; helps bot-blocked sites (e.g. Facebook)
  enrichers:
    - thumbnail_enricher
    - hash_enricher
  databases:
    - csv_db
  storages:
    - s3_storage               # store artifacts in Supabase Storage (S3), not local disk
  formatters:
    - html_formatter

cli_feeder:
  urls: []

# csv_db writes to the ephemeral container fs (we parse stdout, not this file).
csv_db:
  csv_file: /tmp/db.csv

# Artifacts go to Supabase Storage over its S3-compatible API. The bucket is
# public, so cdn_url is the Supabase public-object URL ({key} = stored path).
s3_storage:
  bucket: memory-archive
  region: ap-northeast-1
  endpoint_url: https://<project-ref>.storage.supabase.co/storage/v1/s3
  cdn_url: https://<project-ref>.supabase.co/storage/v1/object/public/memory-archive/{key}
  key: <supabase-s3-access-key-id>
  secret: <supabase-s3-secret>
  private: false

# Push to the Internet Archive as well (optional; needs IA keys).
# archiveorg_enricher:
#   ia_access_key: ${IA_ACCESS_KEY}
#   ia_secret_key: ${IA_SECRET_KEY}
