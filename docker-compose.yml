services:

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app:/usr/share/nginx/html/app:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memorylane
      POSTGRES_PASSWORD: memorylane
      POSTGRES_DB: memorylane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # exposed so NocoDB UI and local psql can connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorylane"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:8080,null
      - BIND_ADDR=0.0.0.0
      - DATABASE_URL=postgresql://memorylane:memorylane@postgres:5432/memorylane
      - UPLOADS_DIR=/data/uploads
    ports:
      - "3001:3001"
    volumes:
      - memorylane-uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ── Adminer (Postgres admin UI) ────────────────────────────────────────────
  # Open http://localhost:8081
  # System: PostgreSQL, Server: postgres, User: memorylane,
  # Password: memorylane, Database: memorylane
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  memorylane-uploads:
