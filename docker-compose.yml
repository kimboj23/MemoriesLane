services:

  # ── Frontend ───────────────────────────────────────────────────────────────
  # nginx serves the static HTML/JSX files and proxies /api to the backend.
  # Open http://localhost:8080 in your browser.
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app:/usr/share/nginx/html/app:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ── Backend ────────────────────────────────────────────────────────────────
  # Node.js API (Express + SQLite). Reads secrets from backend/.env.
  # Database and uploaded photos are stored in the named volume below.
  backend:
    build: ./backend
    env_file: ./backend/.env          # copy backend/.env.example → backend/.env first
    environment:
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:8080,null
      - BIND_ADDR=0.0.0.0
      - DB_PATH=/data/memories.db     # store in the persistent volume (overrides .env)
      - UPLOADS_DIR=/data/uploads     # same volume for photo uploads
    ports:
      - "3001:3001"
    volumes:
      - memorylane-data:/data

  # ── NocoDB admin panel ─────────────────────────────────────────────────────
  # Spreadsheet UI for the admin team: browse/query/edit memories, bulk import,
  # approve rows, add notes/comments. Open http://localhost:8081
  # First-time setup: create an account, then add a Base:
  #   New Base → SQLite → File path: /data/memories.db
  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "8081:8080"
    volumes:
      - memorylane-data:/data         # same volume → can open /data/memories.db
      - nocodb-meta:/usr/app/data     # NocoDB's own metadata (separate)
    environment:
      - NC_DISABLE_TELE=true
      - NC_INVITE_ONLY_SIGNUP=true    # only the first account can sign up; blocks accidental extra accounts
    depends_on:
      - backend

volumes:
  memorylane-data:
  nocodb-meta:
