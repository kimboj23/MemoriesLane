services:

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app:/usr/share/nginx/html/app:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memorylane
      POSTGRES_PASSWORD: memorylane
      POSTGRES_DB: memorylane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # exposed so NocoDB UI and local psql can connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorylane"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:8080,null
      - BIND_ADDR=0.0.0.0
      # DATABASE_URL is intentionally NOT set here so it falls through to
      # backend/.env, which points at the primary Supabase Postgres.
      # To run fully local again, uncomment the line below (uses the postgres service):
      # - DATABASE_URL=postgresql://memorylane:memorylane@postgres:5432/memorylane
      - UPLOADS_DIR=/data/uploads
    ports:
      - "3001:3001"
    volumes:
      - memorylane-uploads:/data/uploads

  # ── Adminer (Postgres admin UI) — points at the primary Supabase DB ─────────
  # Open http://localhost:8081 and log in with:
  #   System:   PostgreSQL
  #   Server:   aws-1-ap-northeast-1.pooler.supabase.com   (pre-filled below)
  #   Username: postgres.xaztyzxdqgoowfrbnpkj
  #   Password: <your Supabase DB password>
  #   Database: postgres
  # To manage the local postgres service instead, set Server back to "postgres".
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=aws-1-ap-northeast-1.pooler.supabase.com

  # ── ArchiveBox (local snapshots of web pages & documents) ───────────────────
  # Locked down: no public index/snapshots/add view. Create the login once
  # (Compose ${VAR} interpolation can't read backend/.env, so we don't auto-create
  # a superuser here — that would only ever use weak defaults):
  #   docker exec --user=archivebox memorieslane-archivebox-1 \
  #     archivebox manage createsuperuser
  # Then log in at http://localhost:8000/admin/. Users persist in archivebox-data.
  archivebox:
    # Custom image = ArchiveBox + rclone; mounts Supabase S3 as /data/archive so
    # snapshots are stored in the cloud, not on local disk. index.sqlite3 stays local.
    build: ./archivebox
    command: server --quick-init 0.0.0.0:8000
    ports:
      - "8000:8000"
    # FUSE needs these so rclone can mount inside the container.
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    env_file: ./archivebox/rclone.env   # RCLONE_CONFIG_SB_* + S3_BUCKET
    environment:
      - PUBLIC_INDEX=False
      - PUBLIC_SNAPSHOTS=False
      - PUBLIC_ADD_VIEW=False
      # Capture sources with broken/incomplete TLS chains (common for VN gov/edu
      # sites). Trade-off: no cert verification on fetched content. See README.
      - CHECK_SSL_VALIDITY=False
      # Allow access + login through a Cloudflare tunnel (foreign hostname).
      # Wildcard survives quick-tunnel URL churn; add your named domain if any.
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=https://*.heomay.xyz,https://*.trycloudflare.com,http://localhost:8000
    volumes:
      # index.sqlite3 lives here (local); /data/archive is the S3 FUSE mount.
      - archivebox-data:/data

  # ── Archive worker (drives ArchiveBox + auto-archiver + Internet Archive) ────
  # Polls the shared Supabase `archives` table for pending jobs. Runs the heavy
  # tools as sibling containers via the mounted Docker socket — must run on the
  # local Docker host (not a serverless API host).
  # NOTE: mounting docker.sock grants this container control of the host Docker
  # daemon. It only runs locally and pulls jobs from your own DB.
  archive-worker:
    build: ./worker
    env_file: ./backend/.env          # DATABASE_URL + IA_ACCESS_KEY/IA_SECRET_KEY
    environment:
      - ARCHIVEBOX_VOLUME=memorylane-archivebox-data
      # Permanent named-tunnel URL (archivebox.heomay.xyz -> localhost:8000) so stored
      # local_url links work for remote testers. Override for pure-local dev.
      - ARCHIVEBOX_PUBLIC_URL=${ARCHIVEBOX_PUBLIC_URL:-https://archivebox.heomay.xyz}
      - AUTOARCHIVER_CONFIG_DIR=memorylane-autoarchiver-config
      # auto-archiver stores to Supabase S3; this is the public-object base used to
      # recognise stored snapshot URLs in its output.
      - AUTOARCHIVER_PUBLIC_URL=${AUTOARCHIVER_PUBLIC_URL:-https://xaztyzxdqgoowfrbnpkj.supabase.co/storage/v1/object/public/memory-archive}
      - POLL_INTERVAL_MS=15000
      - DRY_RUN=${ARCHIVE_DRY_RUN:-0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - archivebox

volumes:
  postgres-data:
  memorylane-uploads:
  # index.sqlite3 + rclone VFS cache live here; archive/ content goes to S3.
  archivebox-data:
    name: memorylane-archivebox-data
  # auto-archiver config (orchestration.yaml). Artifacts go to S3, not a volume.
  autoarchiver-config:
    name: memorylane-autoarchiver-config
